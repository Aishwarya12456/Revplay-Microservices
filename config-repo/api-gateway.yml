server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/revplay/auth/**

        - id: catalog-service
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/revplay/catalog/**

        - id: playlist-service
          uri: lb://PLAYLIST-SERVICE
          predicates:
            - Path=/revplay/playlists/**

        - id: analytics-service
          uri: lb://ANALYTICS-SERVICE
          predicates:
            - Path=/revplay/analytics/**

        - id: favourites-service
          uri: lb://FAVORITES-SERVICE
          predicates:
            - Path=/revplay/favorites/**

        - id: playback-service
          uri: lb://PLAYBACK-SERVICE
          predicates:
            - Path=/revplay/playback/**

        # Swagger Routes
        - id: user-service-docs
          uri: lb://USER-SERVICE
          predicates:
            - Path=/v3/api-docs/user-service/**
          filters:
            - RewritePath=/v3/api-docs/user-service/(?<segment>.*), /v3/api-docs/$\{segment}
        - id: catalog-service-docs
          uri: lb://CATALOG-SERVICE
          predicates:
            - Path=/v3/api-docs/catalog-service/**
          filters:
            - RewritePath=/v3/api-docs/catalog-service/(?<segment>.*), /v3/api-docs/$\{segment}
        - id: playlist-service-docs
          uri: lb://PLAYLIST-SERVICE
          predicates:
            - Path=/v3/api-docs/playlist-service/**
          filters:
            - RewritePath=/v3/api-docs/playlist-service/(?<segment>.*), /v3/api-docs/$\{segment}
        - id: favorites-service-docs
          uri: lb://FAVORITES-SERVICE
          predicates:
            - Path=/v3/api-docs/favorites-service/**
          filters:
            - RewritePath=/v3/api-docs/favorites-service/(?<segment>.*), /v3/api-docs/$\{segment}
        - id: analytics-service-docs
          uri: lb://ANALYTICS-SERVICE
          predicates:
            - Path=/v3/api-docs/analytics-service/**
          filters:
            - RewritePath=/v3/api-docs/analytics-service/(?<segment>.*), /v3/api-docs/$\{segment}
        - id: playback-service-docs
          uri: lb://PLAYBACK-SERVICE
          predicates:
            - Path=/v3/api-docs/playback-service/**
          filters:
            - RewritePath=/v3/api-docs/playback-service/(?<segment>.*), /v3/api-docs/$\{segment}

springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /v3/api-docs/user-service
      - name: Catalog Service
        url: /v3/api-docs/catalog-service
      - name: Playlist Service
        url: /v3/api-docs/playlist-service
      - name: Favorites Service
        url: /v3/api-docs/favorites-service
      - name: Analytics Service
        url: /v3/api-docs/analytics-service
      - name: Playback Service
        url: /v3/api-docs/playback-service

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
    org.springframework.web.servlet.DispatcherServlet: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,actuator