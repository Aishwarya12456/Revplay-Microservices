<div class="flex h-screen overflow-hidden bg-backgroundDark relative">
  <!-- Desktop Sidebar -->
  <app-sidebar class="hidden md:block w-64 bg-surfaceDark flex-shrink-0"></app-sidebar>

  <!-- Mobile Sidebar Overlay (active when isOpen$ is true) -->
  <div *ngIf="sidebarService.isOpen$ | async" 
       class="fixed inset-0 z-50 md:hidden bg-black bg-opacity-50"
       (click)="sidebarService.close()">
    <div class="w-64 h-full bg-surfaceDark shadow-xl" (click)="$event.stopPropagation()">
      <app-sidebar></app-sidebar>
    </div>
  </div>

  <!-- Main Section -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Navbar -->
    <app-navbar class="h-16 bg-surfaceDark flex-shrink-0"></app-navbar>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-4 md:p-6 pb-24 md:pb-20">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Player Bar -->
<app-player-bar class="fixed bottom-0 left-0 right-0 h-24 md:h-20 bg-surfaceLight border-t border-gray-700 z-40"></app-player-bar>
